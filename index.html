<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" class="hidden"></script>
</head>
<body class="bg-white text-black min-h-screen p-8">
    <header class="flex flex-row gap-3 mb-10 items-center flex-wrap">
        <!-- Logo de la empresa -->
        <div class="bg-sky-50/20 rounded-full p-1 border-1 border-sky-50/30 w-30 pl-3 pb-1" >
            <!--<img src="./src/img/colorfly_studio.png" alt="Colorfly Studi logo" width="120" height="auto">-->
            <h1 class="text-xl font-bold mb-6 text-black">Colorfly Studio</h1>
        </div>

        <div class="flex flex-row gap-3 mb-10 items-center flex-wrap">      
                <div class="relative">
                    <select id="miSelectColor" class="bg-white border border-black/20 text-black text-sm rounded px-3 py-2 cursor-pointer focus:outline-none hover:border-black/40">
                        <option value="6">6 colores</option>
                        <option value="8">8 colores</option>
                        <option value="9">9 colores</option>
                    </select>

                    <button onclick="saveValue()" class="bg-white border border-black/25 hover:border-black/60 text-black text-sm font-medium px-5 py-2 rounded transition-colors cursor-pointer">
                    Generar
                    </button>

                    <button onclick="savePalette()"
                    class="bg-white border-2 border-black/40 hover:border-black text-black text-sm font-semibold px-5 py-2 rounded transition-colors cursor-pointer">
                    Guardar
                    </button>

                        
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.2" stroke="currentColor" class="h-5 w-5 ml-1 absolute top-2.5 right-2.5 text-sky-50">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                    </svg>
                 </div>
            </div>

    </header>
    <!--Barra generadora de colores-->
    <main>
        <section>
            <!-- Grid de cards -->
            <div id="grid" class="flex flex-row flex-wrap gap-5 mb-12">
                <!-- Aquí se mostrarán las cajas de colores generados -->
            </div>

            <!-- Paletas guardadas -->
            <div id="savedSection" class="hidden">
                <h2 class="text-xl font-bold mb-4 text-black">Paletas guardadas</h2>
                <div id="savedPalettes" class="flex flex-col gap-2"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Mi Sitio Web</p>
    </footer>
    <script src="./src/js/color.js"></script>
</body>
</html>
