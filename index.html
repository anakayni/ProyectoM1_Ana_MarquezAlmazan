<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorfly Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>

  <header class="header">
    <div class="logo">
      <span class="logo-dot"></span>
      <h1>Colorfly Studio</h1>
    </div>

    <div class="controls">
      <div class="select-wrapper">
        <select id="miSelectColor">
          <option value="6">6 colores</option>
          <option value="8">8 colores</option>
          <option value="9">9 colores</option>
        </select>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9"/>
        </svg>
      </div>

      <button class="btn-generar" onclick="saveValue()">Generar</button>

      <div id="toast-success" class="toast hidden" role="alert">
        <svg fill="currentColor" viewBox="0 0 20 20">
          <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>
        </svg>
        <span>¡Generado!</span>
        <button class="toast-close" onclick="document.getElementById('toast-success').classList.add('hidden')" aria-label="Cerrar">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div id="grid" class="grid"></div>

    <!--Futura funcionalidad
    <div id="savedSection" class="saved-section hidden">
      <h2 class="saved-title">Paletas guardadas</h2>
      <div id="savedPalettes" class="saved-palettes"></div>
    </div>-->
  </main>

  <footer class="footer">
    <p>&copy; 2026 Colorfly Studio</p>
  </footer>

  <script src="./src/js/color.js"></script>
</body>
</html>
