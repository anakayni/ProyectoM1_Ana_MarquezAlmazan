<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" class="hidden"></script>
</head>
<body class="bg-gradient-to-r from-slate-900 to-slate-700 text-white">
    <header>
        <!-- Logo de la empresa -->
        <div class="bg-sky-50/20 rounded-full p-1 border-1 border-sky-50/30 w-30 pl-3 pb-1" >
            <!--<img src="./src/img/colorfly_studio.png" alt="Colorfly Studi logo" width="120" height="auto">-->
                <span class="inline-flex shrink-0 rounded-full bg-sky-500 w-2 h-2"></span>
                <span class="text-xs font-light text-white">Colorfly Studio</span>
        </div>
        <!--Barra generadora de colores-->
        <section>
            <h2>Generador de Colores</h2>
            <input type="color" id="colorPicker" name="colorPicker" value="#ff0000">
            <button onclick="generateColors()">Generar Paleta</button>  
        </section>
    </header>

    <main>
        <section>
            <h2>Sección 1</h2>
            <article>
                <h3>Título del Artículo</h3>
                <p>Number of Colors</p>

                <div class="w-full max-w-sm min-w-[200px]">      
                    <div class="relative">
                        <select id="miSelectColor" class="w-full bg-transparent placeholder:text-sky-50 text-sky-50/80 dark:text-sky-50/80 text-sm border border-sky-50/30 rounded pl-3 pr-8 py-2 transition duration-300 ease focus:outline-none focus:border-slate-400 hover:border-slate-400 shadow-sm focus:shadow-md appearance-none cursor-pointer">
                            <option value="6">6</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                        </select>

                        <button onclick="saveValue()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-colors shadow-md">Generar</button>

                        
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.2" stroke="currentColor" class="h-5 w-5 ml-1 absolute top-2.5 right-2.5 text-sky-50">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                        </svg>
                    </div>
                </div>
            </article>
        </section>

        

        <section>
            <h2>Generated Palette</h2>
            <div id="colorContainer">
                <!-- Aquí se mostrarán las cajas de colores generados -->
                <div id="grid"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Mi Sitio Web</p>
    </footer>
    <script src="./src/js/color.js"></script>
</body>
</html>
