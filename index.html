<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" class="hidden"></script>
</head>
<body class="bg-white text-black min-h-screen p-8">
    <header class="flex flex-row items-center gap-6 mb-10 flex-wrap">
    <div class="bg-sky-50/20 rounded-full px-4 py-1 border border-black/10 flex items-center h-11">
        <h1 class="text-xl font-bold text-black whitespace-nowrap">Colorfly Studio</h1>
    </div>

    <div class="flex items-center gap-3 flex-wrap">
        
        <div class="relative">
            <select id="miSelectColor" class="bg-white border border-black/20 text-black text-sm rounded px-3 py-2 pr-8 cursor-pointer focus:outline-none hover:border-black/40 appearance-none h-10">
                <option value="6">6 colores</option>
                <option value="8">8 colores</option>
                <option value="9">9 colores</option>
            </select>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.2" stroke="currentColor" class="h-4 w-4 absolute top-3 right-2.5 pointer-events-none text-black/50">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
            </svg>
        </div>

        <button onclick="saveValue()" class="bg-black text-white text-sm font-medium px-5 h-10 rounded transition-colors cursor-pointer hover:bg-black/80">
            Generar
        </button>

        <!-- Toast de generador de paleta success -->
        <div id="toast-success" class="flex items-center p-2 bg-green-50 text-green-800 rounded-lg border border-green-200 h-10 hidden" role="alert">
            <div class="inline-flex items-center justify-center shrink-0 w-6 h-6 text-green-500 bg-white rounded shadow-sm">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"></path></svg>
            </div>
            <div class="ms-3 text-sm font-medium mr-4">¡Generado!</div>
            <button type="button" class="ms-auto text-green-500 hover:bg-green-200 p-1 rounded-md" data-dismiss-target="#toast-success" aria-label="Close">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
            </button>
        </div>
    </div>
</header>
    <!--Barra generadora de colores-->
    <main>
        <section>
            <!-- Grid de cards -->
            <div id="grid" class="flex flex-row flex-wrap gap-5 mb-12">
                <!-- Aquí se mostrarán las cajas de colores generados -->
            </div>

            <!-- Paletas guardadas -->
            <div id="savedSection" class="hidden">
                <h2 class="text-xl font-bold mb-4 text-black">Paletas guardadas</h2>
                <div id="savedPalettes" class="flex flex-col gap-2"></div>
            </div>
        </section>
    </main>

    <footer class="fixed bottom-2 left-3 w-full">
        <p>&copy; 2026 Colorfly Studio</p>
    </footer>
    <script src="./src/js/color.js"></script>
</body>
</html>
